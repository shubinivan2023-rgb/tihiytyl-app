<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 230" width="400" height="230">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3B8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Щит с ТТ (по центру сверху) -->
  <g transform="translate(150, 5)">
    <path d="M50,15 L80,23 L80,48 Q80,67 50,85 Q20,67 20,48 L20,23 Z"
          fill="url(#shieldGrad)" opacity="0.9"/>

    <path d="M50,20 L74,26 L74,47 Q74,62 50,77 Q26,62 26,47 L26,26 Z"
          fill="none" stroke="#9EACBA" stroke-width="1.2" opacity="0.5"/>

    <text x="50" y="62"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="34"
          font-weight="bold"
          fill="#E8ECF0"
          text-anchor="middle"
          letter-spacing="1">ТТ</text>
  </g>

  <!-- Text: ТИХИЙТЫЛ -->
  <text x="200" y="140" font-family="'Georgia', 'Times New Roman', serif" font-size="40" font-weight="bold" fill="#E8ECF0" letter-spacing="3" text-anchor="middle">
    ТИХИЙ<tspan fill="#4A90A4">ТЫЛ</tspan>
  </text>

  <!-- Decorative line -->
  <line x1="100" y1="150" x2="300" y2="150" stroke="#4A90A4" stroke-width="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="200" y="170" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#9EACBA" letter-spacing="1.5" text-anchor="middle">ПРОСТРАНСТВО ПОДДЕРЖКИ</text>
</svg>
