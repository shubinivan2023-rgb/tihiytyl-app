<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3B8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Щит (без листочка) -->
  <path d="M50,15 L85,25 L85,55 Q85,80 50,100 Q15,80 15,55 L15,25 Z"
        fill="url(#shieldGrad)" opacity="0.9"/>

  <path d="M50,22 L78,30 L78,54 Q78,75 50,92 Q22,75 22,54 L22,30 Z"
        fill="none" stroke="#9EACBA" stroke-width="1.5" opacity="0.5"/>

  <path d="M35,50 Q35,38 50,35 Q65,38 65,50"
        fill="none" stroke="#E8ECF0" stroke-width="2.5" stroke-linecap="round"/>

  <circle cx="50" cy="52" r="5" fill="#E8ECF0"/>
  <path d="M50,57 L50,68 M44,62 L56,62 M45,76 L50,68 L55,76"
        fill="none" stroke="#E8ECF0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text: ТИХИЙТЫЛ в одну строку -->
  <text x="115" y="70" font-family="'Georgia', 'Times New Roman', serif" font-size="40" font-weight="bold" fill="#E8ECF0" letter-spacing="3">
    ТИХИЙ<tspan fill="#4A90A4">ТЫЛ</tspan>
  </text>

  <!-- Decorative line -->
  <line x1="115" y1="80" x2="400" y2="80" stroke="#4A90A4" stroke-width="1" opacity="0.6"/>

  <!-- Tagline (центрирован относительно текста) -->
  <text x="240" y="95" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#9EACBA" letter-spacing="1.5" text-anchor="middle">ПРОСТРАНСТВО ПОДДЕРЖКИ</text>
</svg>
