<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3B8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Щит (без листочка) -->
  <g transform="translate(165, 0)">
    <path d="M35,15 L70,25 L70,55 Q70,80 35,100 Q0,80 0,55 L0,25 Z"
          fill="url(#shieldGrad)" opacity="0.9"/>

    <path d="M35,22 L63,30 L63,54 Q63,75 35,92 Q7,75 7,54 L7,30 Z"
          fill="none" stroke="#9EACBA" stroke-width="1.5" opacity="0.5"/>

    <path d="M20,50 Q20,38 35,35 Q50,38 50,50"
          fill="none" stroke="#E8ECF0" stroke-width="2.5" stroke-linecap="round"/>

    <circle cx="35" cy="52" r="5" fill="#E8ECF0"/>
    <path d="M35,57 L35,68 M29,62 L41,62 M30,76 L35,68 L40,76"
          fill="none" stroke="#E8ECF0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: ТИХИЙТЫЛ -->
  <text x="200" y="145" font-family="'Georgia', 'Times New Roman', serif" font-size="40" font-weight="bold" fill="#E8ECF0" letter-spacing="3" text-anchor="middle">
    ТИХИЙ<tspan fill="#4A90A4">ТЫЛ</tspan>
  </text>

  <!-- Decorative line -->
  <line x1="100" y1="155" x2="300" y2="155" stroke="#4A90A4" stroke-width="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="200" y="175" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#9EACBA" letter-spacing="1.5" text-anchor="middle">ПРОСТРАНСТВО ПОДДЕРЖКИ</text>
</svg>
