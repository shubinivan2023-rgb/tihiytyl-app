<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Градиент щита в цветах лендинга -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3B8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield (щит) -->
  <path d="M50,15 L80,23 L80,48 Q80,67 50,85 Q20,67 20,48 L20,23 Z"
        fill="url(#shieldGrad)" opacity="0.9"/>

  <!-- Inner shield highlight -->
  <path d="M50,20 L74,26 L74,47 Q74,62 50,77 Q26,62 26,47 L26,26 Z"
        fill="none" stroke="#9EACBA" stroke-width="1.2" opacity="0.5"/>

  <!-- ТТ в центре (обе буквы белые) -->
  <text x="50" y="62" 
        font-family="'Georgia', 'Times New Roman', serif" 
        font-size="34" 
        font-weight="bold" 
        fill="#E8ECF0" 
        text-anchor="middle"
        letter-spacing="1">ТТ</text>

</svg>
